<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Clock tower -->
  <rect x="19" y="4" width="10" height="12" fill="#2c3e50"/>
  <circle cx="24" cy="10" r="3.5" fill="white" stroke="#2c3e50" stroke-width="1"/>
  <line x1="24" y1="10" x2="24" y2="7.5" stroke="#2c3e50" stroke-width="1"/>
  <line x1="24" y1="10" x2="26" y2="10" stroke="#2c3e50" stroke-width="1"/>
  <!-- Roof cornice -->
  <rect x="5" y="15" width="38" height="3" fill="#1a252f"/>
  <!-- Station facade -->
  <rect x="7" y="18" width="34" height="20" fill="#2c3e50"/>
  <!-- Arched windows -->
  <rect x="10" y="21" width="7" height="11" rx="3.5 3.5 0 0" fill="#a8c4d4"/>
  <rect x="20" y="21" width="8" height="11" rx="4 4 0 0" fill="#a8c4d4"/>
  <rect x="31" y="21" width="7" height="11" rx="3.5 3.5 0 0" fill="#a8c4d4"/>
  <!-- Steps -->
  <rect x="5" y="38" width="38" height="3" fill="#1a252f"/>
  <rect x="3" y="41" width="42" height="3" fill="#1a252f"/>
</svg>
